[project]
name = "streamlit-dividend-dashboard"
version = "0.1.0"
description = "A Streamlit application for visualizing and analyzing stock dividend data."
authors = [
    {name = "s"}
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.2.3,<3.0.0",
    "streamlit>=1.51.0,<2.0.0",
    "plotly>=5.24.1,<6.0.0",
    "streamlit-elements>=0.1.0,<0.2.0",
    "pydantic-settings>=2.0.0,<3.0.0",
    "hypothesis (>=6.151.9,<7.0.0)",
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = ">=3.11"
pandas = ">=2.2.3,<3.0.0"
streamlit = ">=1.51.0,<2.0.0"
plotly = ">=5.24.1,<6.0.0"
pydantic-settings = ">=2.0.0,<3.0.0"

[dependency-groups]
dev = [
    "pytest (>=8.3.0,<9.0.0)",
    "pytest-cov (>=6.0.0,<7.0.0)",
    "pytest-mock (>=3.14.0,<4.0.0)",
    "pytest-asyncio (>=0.24.0,<0.25.0)",
    "pytest-xdist (>=3.6.0,<4.0.0)",
    "hypothesis (>=6.120.0,<7.0.0)",
    "freezegun (>=1.5.0,<2.0.0)",
    "pytest-benchmark (>=5.0.0,<6.0.0)",
    "mypy (>=1.13.0,<2.0.0)",
    "ruff (>=0.8.0,<0.9.0)"
]
