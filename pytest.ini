[pytest]
# ============================================================================
# Test Discovery & Execution
# ============================================================================
testpaths = tests
pythonpath = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ============================================================================
# Display & Reporting Options
# ============================================================================
addopts = 
    # Verbosity and output
    -v
    --strict-markers
    --tb=short
    
    # Show slowest tests
    --durations=10

# ============================================================================
# Markers (for test categorization)
# ============================================================================
markers =
    unit: Unit tests - fast, isolated, no I/O
    integration: Integration tests - component interaction & I/O
    e2e: End-to-end tests - full user workflows
    slow: Tests that take > 1 second (skip in quick runs)
    property: Property-based tests using hypothesis
    benchmark: Performance benchmarks and stress tests
    xfail: Known failures (tests expected to fail)
    skipif: Conditional skip based on environment

# ============================================================================
# Coverage Configuration (requires pytest-cov: pip install pytest-cov)
# ============================================================================
[coverage:run]
source = .
omit = 
    tests/*
    */__pycache__/*
    */site-packages/*
    */.venv/*
    __init__.py
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    except ImportError
    except ModuleNotFoundError

[coverage:html]
directory = htmlcov
title = Streamlit Dividend Dashboard - Coverage Report

