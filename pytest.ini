[pytest]
# ============================================================================
# Test Discovery & Execution
# ============================================================================
testpaths = tests
pythonpath = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ============================================================================
# Display & Reporting Options
# ============================================================================
addopts =
    -v
    --strict-markers
    --tb=short
    --durations=10

# ============================================================================
# Markers (for test categorization)
# ============================================================================
markers =
    unit: Unit tests - fast, isolated, no I/O
    integration: Integration tests - component interaction & I/O
    e2e: End-to-end tests - full user workflows
    slow: Tests that take > 1 second (skip in quick runs)
    property: Property-based tests using hypothesis
    benchmark: Performance benchmarks and stress tests
    smoke: Fast read-only checks across the E2E suite (pre-commit gate)
    a11y: Accessibility tests - axe-core + keyboard navigation
    regression: Guards a previously-broken invariant
    critical: Must-not-regress financial or accessibility assertions
    responsive: Mobile / tablet viewport rendering
    charts: Chart element presence (Plotly, Nivo)

# Coverage configuration lives in pyproject.toml under [tool.coverage.*]
